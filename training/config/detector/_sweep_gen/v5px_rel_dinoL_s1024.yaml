# ============================================================================
# BACKBONE ABLATION — DINOv2 ViT-L/14 (1024-dim) instead of CLIP-L/14.
# Clone of v5px_rel_w001.yaml (the seed-1024 GAIN main run). Swaps the pixel
# backbone from CLIP to DINOv2 at MATCHED capacity (1024-dim, patch-14, 256
# tokens) so the comparison isolates pretraining (language-aligned CLIP vs
# self-supervised DINO), not model size. Requires DINO-specific changes:
#   - pixel_backbone: dino + dino_model_name
#   - lora_targets: ['query','value']  (DINOv2 attention naming, not q/v_proj)
#   - ImageNet normalization (DINOv2 was trained with it, not CLIP stats)
# Same GAIN recipe, same seed 1024, same data. Pairs with the CLIP-L main run.
# ============================================================================

model_name: dual_branch_patch_v5
mode: pixel_only

# ---------------- Pixel Branch (DINOv2 ViT-L/14) ----------------
pixel_backbone: dino
dino_model_name: facebook/dinov2-large           # 1024-dim (VARIANTS in pixel_branch_dino_v5)
adapter_type: lora
svd_rank_keep: 1023
svd_ortho_weight: 0.0
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.1
lora_targets: ['query', 'value']                 # DINOv2 attention naming

## ImageNet normalization (DINOv2 pretraining stats, NOT CLIP)
mean: [0.485, 0.456, 0.406]
std:  [0.229, 0.224, 0.225]

# ---------------- Frequency Branch (FFT) — inert under pixel_only ----------------
freq_backbone: resnet18
freq_backbone_name: resnet18_freq
freq_backbone_config:
  inc: 6
  num_classes: 512
freq_out_dim: 512
fft_log_scale: true
sr_type: null

# ---------------- Classification head ----------------
backbone_config:
  num_classes: 2
head_hidden_dim: 256
head_dropout: 0.3

# ==================== Losses ====================
loss_func: cross_entropy
label_smoothing: 0.1

patch_center_weight: 0.1
scl_ema_tau: 0.99

var_weight: 5.0
cov_weight: 0.1

pooled_var_weight: 0.0
pooled_cov_weight: 0.0
pooled_var_gamma: 1.0

# --- Fishr (GAIN relative-invariance recipe) ---
fishr_weight: 0.01
fishr_relative: true
fishr_rel_eps: 1.0e-8
fishr_rel_floor: 0.001
fishr_unbiased: true
fishr_warmup: 1500
fishr_gamma: 0.99
fishr_envs: [0, 1, 2, 3]

scl_weight: 0
varcov_real_only: false
aniso_varcov: false

# ==================== Diagnostics ====================
diag_log_every: 500

# ==================== Optimizer ====================
optimizer:
  type: adam
  adam:
    lr: 0.0001
    beta1: 0.9
    beta2: 0.999
    eps: 0.00000001
    weight_decay: 0.0005
    amsgrad: false

lr_scheduler: null
nEpochs: 5
start_epoch: 0
save_epoch: 1
rec_iter: 100
logdir: ./logs
save_ckpt: true
save_feat: false

# ==================== Data ====================
batchSize: 32
frame_num: {'train': 32, 'test': 32}
resolution: 224
clip_grid: 16        # 224/14 for ViT-L/14 (inert under pixel_only)

train_dataset: ['FaceForensics++']
test_dataset: ['Celeb-DF-v2']
compression: 'c23'
train_batchSize: 32
test_batchSize: 32
workers: 8
manualSeed: 1024
with_mask: false
with_landmark: false

# ---- Data Augmentation (base q40) ----
use_data_augmentation: true
data_aug:
  flip_prob: 0.5
  rotate_prob: 0.5
  rotate_limit: 10
  blur_prob: 0.5
  blur_limit: 7
  brightness_prob: 0.5
  brightness_limit: 0.1
  contrast_limit: 0.1
  quality_lower: 40
  quality_upper: 100

metric_scoring: auc

cuda: true
cudnn: true

log_dir: './logs/dual_branch_patch'
