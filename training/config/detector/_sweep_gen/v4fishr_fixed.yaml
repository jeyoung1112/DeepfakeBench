# ============================================================================
# v4 recipe — Fishr ON (relative/scale-invariant) + anti-saturation fixes.
# Motivated by the 07-08/07-13 run diagnostics:
#   - CE saturated (cls 0.65->0.10) => per-sample grads vanished => Fishr inert
#       -> label_smoothing keeps resid = p - y bounded away from zero
#       -> lower lr (2e-4 -> 1e-4) stretches the fitting phase
#       -> fishr_relative matches variance RATIOS, penalty cannot decay with scale
#   - pooled real features collapsed (real_feat_var 0.37->0.02, eff_rank->1)
#       -> pooled_var/cov guard on the fused head-input (patch guard didn't cover it)
# A/B partner (matched baseline, fishr_weight 0): dualbranchpatch_v4_baseline.yaml
# Vanilla-Fishr ablation: set fishr_relative: false (then fishr_weight ~50-100).
# ============================================================================

model_name: dual_branch_patch
mode: dual

# ---------------- Pixel Branch (LoRA-CLIP) ----------------
clip_model_name: openai/clip-vit-large-patch14
freeze_clip: false
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.1
lora_targets: ['q_proj', 'v_proj']

## CLIP normalization
mean: [0.48145466, 0.4578275, 0.40821073]
std:  [0.26862954, 0.26130258, 0.27577711]

# ---------------- Frequency Branch (FFT) ----------------
freq_backbone: resnet18
freq_backbone_name: resnet18_freq
freq_backbone_config:
  inc: 6
  num_classes: 512
freq_out_dim: 512
fft_log_scale: true
sr_type: null

# ---------------- Classification head ----------------
backbone_config:
  num_classes: 2
head_hidden_dim: 256
head_dropout: 0.3

# ==================== Losses ====================
loss_func: cross_entropy
label_smoothing: 0.1       # NEW: keeps CE gradients alive so Fishr has signal late

# --- Patch-level real-only center loss ---
patch_center_weight: 0.1
scl_ema_tau: 0.99

# --- Per-patch variance-covariance (collapse guard, patch grain) ---
var_weight: 5.0
cov_weight: 0.1

# --- Pooled-feature variance-covariance (NEW: head-input collapse guard) ---
pooled_var_weight: 1.0     # hinge on per-dim std of real fused features
pooled_cov_weight: 0.05    # off-diagonal decorrelation, conservative start
pooled_var_gamma: 1.0      # hinge target std; lower to ~0.6 if pooled_var stays pinned
                           # (healthy pre-collapse real std was ~0.6, not 1.0)

# --- Cross-manipulation invariance via Fishr (relative variant) ---
fishr_weight: 0.01         # smoke-measured: relative penalty ~140 at init -> weighted
                           # ~1.4x cls; it shrinks as the EMA converges. Sweep
                           # {0.003, 0.01, 0.03} and keep weight*fishr ~ 0.1-1x cls.
                           # NOTE: the EMA detach damps the *gradient* by (1-gamma)
                           # (~100x at 0.99), so effective pressure is weaker than the
                           # loss value suggests -- prefer sweeping weight UP first.
fishr_relative: true       # scale-invariant: match variance ratios, not raw deviations
fishr_rel_eps: 1.0e-8
fishr_rel_floor: 0.001     # denominator floor as fraction of mean variance (grad safety)
fishr_unbiased: true       # unbiased per-env variance (removes batch-size bias)
fishr_warmup: 300          # penalty on early -- peak generalization is epoch ~1-2
fishr_gamma: 0.99
fishr_envs: [0, 1, 2, 3]

# --- Legacy / inert in the patch path ---
scl_weight: 0
varcov_real_only: false
aniso_varcov: false

# ==================== Diagnostics ====================
diag_log_every: 500

# ==================== Optimizer ====================
optimizer:
  type: adam
  adam:
    lr: 0.0001             # halved from 2e-4: slow CE saturation, widen Fishr's window
    beta1: 0.9
    beta2: 0.999
    eps: 0.00000001
    weight_decay: 0.0005
    amsgrad: false

lr_scheduler: null
nEpochs: 5
start_epoch: 0
save_epoch: 1
rec_iter: 100
logdir: ./logs
save_ckpt: true
save_feat: false

# ==================== Data ====================
batchSize: 32
frame_num: {'train': 32, 'test': 32}
resolution: 224
clip_grid: 16

train_dataset: ['FaceForensics++']
test_dataset: ['Celeb-DF-v2']    # screening protocol; full 5-set eval via test.py after
compression: 'c23'
train_batchSize: 32
test_batchSize: 32
workers: 8
manualSeed: 1024
with_mask: false
with_landmark: false

# ---- Data Augmentation ----
use_data_augmentation: true
data_aug:
  flip_prob: 0.5
  rotate_prob: 0.5
  rotate_limit: 10
  blur_prob: 0.5
  blur_limit: 7
  brightness_prob: 0.5
  brightness_limit: 0.1
  contrast_limit: 0.1
  quality_lower: 40
  quality_upper: 100

metric_scoring: auc

cuda: true
cudnn: true

log_dir: './logs/dual_branch_patch'
