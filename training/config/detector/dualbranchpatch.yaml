
model_name: dual_branch_patch      
mode: dual                         

# ---------------- Pixel Branch (LoRA-CLIP) ----------------
clip_model_name: openai/clip-vit-large-patch14
freeze_clip: false
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.1
lora_targets: ['q_proj', 'v_proj']

## CLIP normalization
mean: [0.48145466, 0.4578275, 0.40821073]
std:  [0.26862954, 0.26130258, 0.27577711]

# ---------------- Frequency Branch (FFT) ----------------
freq_backbone: resnet18
freq_backbone_name: resnet18_freq
freq_backbone_config:
  inc: 6                 # 3 magnitude + 3 phase channels
  num_classes: 512       # ResNet pooled output dim
freq_out_dim: 512        # pooled dim; patch tokens use the 512-ch spatial map (map_dim, auto)
fft_log_scale: true
sr_type: null            # optional spectral-residual norm; set 'original' to enable

# ---------------- Classification head ----------------
backbone_config:
  num_classes: 2         # real vs fake (head output)
head_hidden_dim: 256
head_dropout: 0.3

# ==================== Losses ====================
loss_func: cross_entropy

# --- Patch-level real-only center loss (NEW; replaces the global SCL) ---
patch_center_weight: 0.1
scl_ema_tau: 0.99          # EMA momentum for the patch center (key reused by patch_center)

# --- Per-patch variance-covariance (collapse guard; thesis-tuned, RE-TUNE at patch grain) ---
var_weight: 5.0
cov_weight: 0.1

# --- Cross-manipulation invariance via Fishr (toggle: 0 = baseline, >0 = Fishr on) ---
# Domains = FF++ manipulation ids from data_dict['env'] (DF=0 F2F=1 FS=2 NT=3).
fishr_weight: 0.0          # baseline when 0; after warmup ramp up (try 1 -> 10 -> 100) and tune against the logged fishr/grad_var_dist
fishr_warmup: 1500         # optimizer steps of CE+geometry before the penalty is added (EMA warms during this window)
fishr_gamma: 0.99          # EMA momentum for per-env gradient variance (lower => stronger per-step gradient, noisier)
fishr_envs: [0, 1, 2, 3]   # fake manipulation env ids used as domains (use [0,1,2] for a 3-way LOMO split)

# --- Legacy / inert in the patch path (kept only for build_loss compatibility) ---
scl_weight: 0              # global SCL not applied in the patch path; patch_center supersedes it
varcov_real_only: false    # patch path is always real-only internally
aniso_varcov: false        # anisotropic var-cov is NOT wired into the patch loss

# ==================== Diagnostics ====================
diag_log_every: 500        # steps between patch/feature variance logs

# ==================== Optimizer ====================
optimizer:
  type: adam
  adam:
    lr: 0.0002
    beta1: 0.9
    beta2: 0.999
    eps: 0.00000001
    weight_decay: 0.0005
    amsgrad: false

lr_scheduler: null
nEpochs: 10
start_epoch: 0
save_epoch: 1
rec_iter: 100
logdir: ./logs
save_ckpt: true
save_feat: false

# ==================== Data ====================
batchSize: 32
frame_num: {'train': 32, 'test': 32}
resolution: 224            # CLIP ViT-L/14 input
clip_grid: 16              # NEW: patch grid side; MUST equal resolution / patch_size (224 / 14 = 16)

train_dataset: ['FaceForensics++']
test_dataset: ['FaceForensics++']
compression: 'c23'
train_batchSize: 32
test_batchSize: 32
workers: 8
manualSeed: 1024
with_mask: false
with_landmark: false

# ---- Data Augmentation ----
use_data_augmentation: true
data_aug:
  flip_prob: 0.5
  rotate_prob: 0.5
  rotate_limit: 10
  blur_prob: 0.5
  blur_limit: 7
  brightness_prob: 0.5
  brightness_limit: 0.1
  contrast_limit: 0.1
  quality_lower: 40
  quality_upper: 100

metric_scoring: auc

cuda: true
cudnn: true

log_dir: './logs/dual_branch_patch'