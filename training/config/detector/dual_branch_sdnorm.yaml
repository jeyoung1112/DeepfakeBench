detector_name: dual_branch_sdnorm
mode: dual

# --- Pixel Branch ---
clip_model_name: openai/clip-vit-large-patch14
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.1
lora_targets: ['q_proj', 'v_proj']

# --- Frequency Branch (FFT) ---
freq_backbone: resnet18
freq_backbone_name: resnet18_freq
freq_backbone_config:
  inc: 6              # 3 magnitude + 3 phase channels
  num_classes: 512
freq_out_dim: 512
resolution: 224
fft_log_scale: true   # log(1 + |F|) for magnitude

# --- SDNorm (FFT variant) ---
use_sdnorm: true
sdnorm_config:
  num_rings: 4
  eps: 1.0e-5
  aug_prob: 0.5
  learnable_affine: true
  sharpness: 5.0

# --- Fusion Head ---
head_hidden_dim: 256
head_dropout: 0.3
backbone_config:
  num_classes: 2

# --- VICReg ---
embed_dim: 4096
vicreg_weight: 0.1
lambda_inv: 25.0
mu_var: 25.0
nu_cov: 1.0

# --- Loss ---
loss_func: cross_entropy

# --- Training ---
optimizer:
  type: adam
  lr: 1.0e-4
  weight_decay: 1.0e-5
scheduler:
  type: cosine
  T_max: 50
  eta_min: 1.0e-6
batch_size: 32
num_epochs: 50
seed: 42

train_dataset: FaceForensics++
compression: c23
frame_num: 32
