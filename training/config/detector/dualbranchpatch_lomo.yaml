# ============================================================================
# LOMO (leave-one-manipulation-out) DIAGNOSTIC — Fishr OFF (baseline).
# Train on FF-DF / FF-F2F / FF-FS, test on the held-out FF-NT.
# Isolates the cross-manipulation axis Fishr actually targets.
# IDENTICAL to dualbranchpatch.yaml except: train/test datasets, fishr_envs.
# A/B partner (Fishr on): dualbranchpatch_fishr_lomo.yaml
# NOTE: each FF-* JSON carries its paired reals, so the real set is included
# once per manipulation subset (~3x). Fine for a diagnostic; be aware of it.
# ============================================================================

model_name: dual_branch_patch
mode: dual

# ---------------- Pixel Branch (LoRA-CLIP) ----------------
clip_model_name: openai/clip-vit-large-patch14
freeze_clip: false
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.1
lora_targets: ['q_proj', 'v_proj']

## CLIP normalization
mean: [0.48145466, 0.4578275, 0.40821073]
std:  [0.26862954, 0.26130258, 0.27577711]

# ---------------- Frequency Branch (FFT) ----------------
freq_backbone: resnet18
freq_backbone_name: resnet18_freq
freq_backbone_config:
  inc: 6
  num_classes: 512
freq_out_dim: 512
fft_log_scale: true
sr_type: null

# ---------------- Classification head ----------------
backbone_config:
  num_classes: 2
head_hidden_dim: 256
head_dropout: 0.3

# ==================== Losses ====================
loss_func: cross_entropy

patch_center_weight: 0.1
scl_ema_tau: 0.99

var_weight: 5.0
cov_weight: 0.1

# --- Cross-manipulation invariance via Fishr (OFF = baseline) ---
fishr_weight: 0.0          # baseline
fishr_warmup: 1500
fishr_gamma: 0.99
fishr_envs: [0, 1, 2]      # 3-way split: FF-DF=0, FF-F2F=1, FF-FS=2 (positional in train_dataset order)

scl_weight: 0
varcov_real_only: false
aniso_varcov: false

# ==================== Diagnostics ====================
diag_log_every: 500

# ==================== Optimizer ====================
optimizer:
  type: adam
  adam:
    lr: 0.0002
    beta1: 0.9
    beta2: 0.999
    eps: 0.00000001
    weight_decay: 0.0005
    amsgrad: false

lr_scheduler: null
nEpochs: 10
start_epoch: 0
save_epoch: 1
rec_iter: 100
logdir: ./logs
save_ckpt: true
save_feat: false

# ==================== Data ====================
batchSize: 32
frame_num: {'train': 32, 'test': 32}
resolution: 224
clip_grid: 16

train_dataset: ['FF-DF', 'FF-F2F', 'FF-FS']   # env ids 0,1,2 (positional)
test_dataset: ['FF-NT']                        # held-out manipulation
compression: 'c23'
train_batchSize: 32
test_batchSize: 32
workers: 8
manualSeed: 1024
with_mask: false
with_landmark: false

# ---- Data Augmentation ----
use_data_augmentation: true
data_aug:
  flip_prob: 0.5
  rotate_prob: 0.5
  rotate_limit: 10
  blur_prob: 0.5
  blur_limit: 7
  brightness_prob: 0.5
  brightness_limit: 0.1
  contrast_limit: 0.1
  quality_lower: 40
  quality_upper: 100

metric_scoring: auc

cuda: true
cudnn: true

log_dir: './logs/dual_branch_patch'
